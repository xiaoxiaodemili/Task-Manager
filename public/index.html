<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskManage - 敏捷项目管理</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login View -->
    <div id="login-view" class="view active">
        <div class="glass-card login-box">
            <div class="brand-logo">TM</div>
            <h1>欢迎回来</h1>
            <p>登录到任务管理系统</p>
            <form id="login-form">
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="username" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn primary full-width">🚀 登 录</button>
            </form>
            <div id="login-error" class="error-msg"></div>
        </div>
    </div>

    <!-- App View -->
    <div id="app-view" class="view">
        <nav class="sidebar glass-panel">
            <div class="brand">
                <div class="brand-logo small">TM</div>
                <h2>TaskManage</h2>
            </div>
            <ul class="nav-menu">
                <li data-target="dashboard" class="nav-item active">📁 项目看板</li>
                <li data-target="kanban" class="nav-item">📋 任务视图</li>
                <li data-target="members" class="nav-item pm-only">👥 成员管理</li>
                <li data-target="reports" class="nav-item pm-only">📈 数据报表</li>
            </ul>
            <div class="user-info">
                <div class="avatar">👨‍💻</div>
                <div class="details">
                    <span id="current-username">User</span>
                    <span id="current-role" class="badge">ROLE</span>
                </div>
                <button id="logout-btn" class="btn icon-btn" title="退出登录">🚪</button>
            </div>
        </nav>
        
        <main class="content">
            <!-- Dashboard -->
            <section id="dashboard" class="page active">
                <div class="page-header">
                    <div>
                        <h1>项目列表</h1>
                        <p class="subtitle">管理您的所有项目与进度</p>
                    </div>
                    <button class="btn primary pm-only" id="create-project-btn">+ 新建项目</button>
                </div>
                <div class="grid" id="projects-grid">
                    <!-- Cards injected via JS -->
                </div>
            </section>

            <!-- Kanban -->
            <section id="kanban" class="page">
                <div class="page-header kanban-header">
                    <div>
                        <h1>任务看板</h1>
                        <div class="select-wrapper">
                            <select id="project-selector" class="glass-select">
                                <option value="">正在加载项目...</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn primary" id="create-task-btn">+ 新建任务</button>
                </div>
                <div class="board" id="kanban-board">
                    <div class="column glass-panel" data-status="TODO">
                        <div class="col-header">
                            <h3>待完成 <span class="count todo-count">0</span></h3>
                            <div class="status-indicator stat-todo"></div>
                        </div>
                        <div class="task-list" id="col-TODO"></div>
                    </div>
                    <div class="column glass-panel" data-status="IN_PROGRESS">
                        <div class="col-header">
                            <h3>进行中 <span class="count inprog-count">0</span></h3>
                            <div class="status-indicator stat-inprog"></div>
                        </div>
                        <div class="task-list" id="col-IN_PROGRESS"></div>
                    </div>
                    <div class="column glass-panel" data-status="DONE">
                        <div class="col-header">
                            <h3>已完成 <span class="count done-count">0</span></h3>
                            <div class="status-indicator stat-done"></div>
                        </div>
                        <div class="task-list" id="col-DONE"></div>
                    </div>
                </div>
            </section>

            <!-- Members -->
            <section id="members" class="page pm-only">
                <div class="page-header">
                    <div>
                        <h1>成员管理</h1>
                        <p class="subtitle">管理团队访问权限与角色</p>
                    </div>
                    <button class="btn primary" id="create-user-btn">+ 新建成员</button>
                </div>
                <div class="table-container glass-panel">
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>角色权限</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <!-- Reports -->
            <section id="reports" class="page pm-only">
                <div class="page-header">
                    <div>
                        <h1>数据报表</h1>
                        <p class="subtitle">查看并导出详细的项目工作完成情况</p>
                    </div>
                </div>
                <div class="glass-panel" style="padding: 20px; margin-bottom: 20px;">
                    <div class="report-controls" style="display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end;">
                        <div class="input-group" style="margin-bottom:0; flex: 1; min-width: 150px;">
                            <label>统计周期</label>
                            <select id="report-type" class="glass-select">
                                <option value="all">显示全部</option>
                                <option value="month">按月筛选</option>
                                <option value="quarter">按季度筛选</option>
                                <option value="year">按年筛选</option>
                            </select>
                        </div>
                        <div id="report-year-group" class="input-group" style="margin-bottom:0; flex: 1; min-width: 100px; display:none;">
                            <label>年份</label>
                            <input type="number" id="report-year" value="2026">
                        </div>
                        <div id="report-value-group" class="input-group" style="margin-bottom:0; flex: 1; min-width: 150px; display:none;">
                            <label id="report-value-label">选择月份</label>
                            <input type="number" id="report-value" value="4" min="1" max="12">
                        </div>
                        <button type="button" class="btn primary" id="report-search-btn">🔍 查找</button>
                        <button type="button" class="btn primary" onclick="exportReportToCSV()">⬇️ 导出当前视图为 CSV</button>
                    </div>
                </div>
                <div class="table-container glass-panel" style="overflow-x: auto;">
                    <table id="report-detailed-table">
                        <thead>
                            <tr>
                                <th>项目名称</th>
                                <th>项目描述</th>
                                <th>负责人</th>
                                <th>截止时间</th>
                                <th>任务名称</th>
                                <th>任务内容</th>
                                <th>完成状态</th>
                                <th>责任人</th>
                                <th>截止时间</th>
                                <th>完成时间</th>
                            </tr>
                        </thead>
                        <tbody id="report-table-body">
                            <!-- Data injected via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals (Hidden) -->
    <div id="modal-overlay" class="modal-overlay">
        <!-- Forms dynamically injected -->
    </div>
    
    <script src="app.js"></script>
</body>
</html>
